worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    server {
        listen 8080;
        server_name _;
        root /app;
        index index.html;

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|mp3|wav|ogg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # SPA fallback: 所有路径都返回 index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # JSZip CDN（如果用户需要离线功能可保留本地图）
        location /cdn/ {
            proxy_pass https://cdnjs.cloudflare.com/;
            proxy_set_header Host cdnjs.cloudflare.com;
        }

        # 禁止访问隐藏文件
        location ~ /\. {
            deny all;
        }
    }
}
